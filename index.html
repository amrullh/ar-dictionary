<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Kamus 3D — EN/ID</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:,">
</head>
<body>

<!-- ── Loading ─────────────────────────────────────────── -->
<div id="loading">
  <div class="loading-inner">
    <div class="load-title">3D <span>Dictionary</span></div>
    <div class="load-sub">Memuat huruf A–Z...</div>
    <div id="loading-letters">
      <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span>
      <span>F</span><span>G</span><span>H</span><span>I</span><span>J</span>
      <span>K</span><span>L</span><span>M</span><span>N</span><span>O</span>
      <span>P</span><span>Q</span><span>R</span><span>S</span><span>T</span>
      <span>U</span><span>V</span><span>W</span><span>X</span><span>Y</span>
      <span>Z</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div id="progress-bar"></div></div>
      <div id="progress-label">0%</div>
    </div>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────────── -->
<div id="app">

  <!-- Kamera AR background (hidden by default) -->
  <video id="ar-video" autoplay playsinline muted></video>

  <!-- Mobile topbar -->
  <header id="topbar">
    <div class="topbar-title">3D <span>Dictionary</span></div>
    <div class="topbar-controls">
      <!-- AR toggle button -->
      <button id="btn-ar" class="btn-ar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span class="btn-label">AR Mode</span>
      </button>
      <!-- Flip camera (only shown in AR mode) -->
      <button id="btn-flip" class="btn-flip hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
      <div class="topbar-badge">EN / ID</div>
    </div>
  </header>

  <!-- Canvas area -->
  <main id="main">
    <div id="canvas-container"></div>

    <!-- AR Mode badge overlay -->
    <div id="ar-badge" class="hidden">
      <span>● LIVE</span>
    </div>

    <div id="hint" class="hidden">
      <p id="hint-text">← Pilih kata dari daftar</p>
    </div>

    <div id="info-panel">
      <div class="word-en"  id="panel-word-en"></div>
      <div class="word-id"  id="panel-word-id"></div>
      <div class="divider"></div>
      <div class="definition" id="panel-definition"></div>
    </div>
  </main>

  <!-- Sidebar / bottom sheet -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="label">Kamus Interaktif</div>
      <h1>3D <span>Dictionary</span></h1>
      <div id="badge">EN / ID</div>
      <!-- AR button desktop -->
      <button id="btn-ar-desktop" class="btn-ar-desktop" onclick="document.getElementById('btn-ar').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        AR Mode
      </button>
    </div>
    <div id="word-list"></div>
  </aside>

  <!-- Toast error -->
  <div id="ar-toast" class="hidden">
    Kamera tidak bisa diakses. Pastikan izin kamera sudah diberikan dan buka via HTTPS.
  </div>

</div>

<script src="data/words.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
